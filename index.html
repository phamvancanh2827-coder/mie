<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Minna Quiz - Bài 7: Cho và Nhận</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com-react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      * { box-sizing: border-box; }
      .safe-game-wrapper {
        background-color: #1a1a1a; padding: 20px 0; border-radius: 16px; margin: 20px 0;
        display: flex; justify-content: center; align-items: center;
      }
      ruby { ruby-align: center; }
      @keyframes mario-jump {
        0% { transform: translateY(0) scale(1); }
        30% { transform: translateY(-130px) scale(1.05); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes obstacle-slide {
        0% { transform: translateX(200px); opacity: 1; }
        100% { transform: translateX(-50px); opacity: 0; }
      }
      .animate-mario-jump { animation: mario-jump 1.2s forwards; }
      .animate-obstacle-slide { animation: obstacle-slide 1.2s linear forwards; }
      .game-btn { box-shadow: 0px 6px 0px rgba(0,0,0,0.3); transition: all 0.1s; }
      .game-btn:active:not(:disabled) { box-shadow: 0px 0px 0px rgba(0,0,0,0.3); transform: translateY(6px); }
      .dialog-box { box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3), inset 4px 4px 0px rgba(255,255,255,0.3), 8px 8px 0px rgba(0,0,0,0.5); }
      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="safe-game-wrapper">
        <div id="root" class="w-full"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BỘ CÂU HỎI BÀI 7 ---
        const quizData = [
          // TỪ VỰNG
          { q: 'Từ vựng: "Cắt" tiếng Nhật là gì?', options: ["{切|き}ります", "{送|おく}ります", "{貸|か}します", "{習|なら}います"], a: 0 },
          { q: 'Từ vựng: "Gửi" tiếng Nhật là gì?', options: ["{送|おく}ります", "{借|か}ります", "{貸|か}します", "{揚|あ}げます"], a: 0 },
          { q: 'Từ vựng: "Cho mượn, cho vay" tiếng Nhật là gì?', options: ["{貸|か}します", "{借|か}ります", "{教|おし}えます", "{習|なら}います"], a: 0 },
          { q: 'Từ vựng: "Mượn, vay" tiếng Nhật là gì?', options: ["{借|か}ります", "{貸|か}します", "{教|おし}えます", "{習|なら}います"], a: 0 },
          { q: 'Từ vựng: "Dạy" tiếng Nhật là gì?', options: ["{教|おし}えます", "{習|なら}います", "{貸|か}します", "{書|か}きます"], a: 0 },
          { q: 'Từ vựng: "Học tập (từ ai đó)" tiếng Nhật là gì?', options: ["{習|なら}います", "{教|おし}えます", "{貸|か}します", "{借|k}ります"], a: 0 },
          { q: 'Từ vựng: "Gọi điện thoại" tiếng Nhật là gì?', options: ["{電話|でんわ}をかけます", "{電話|でんわ}をします", "{電話|でんわ}をきます", "{電話|でんわ}をあげます"], a: 0 },
          { q: 'Từ vựng: "Cái thìa" tiếng Nhật là gì?', options: ["スプーン", "フォーク", "ナイフ", "はし"], a: 0 },
          { q: 'Từ vựng: "Cái nĩa" tiếng Nhật là gì?', options: ["フォーク", "スプーン", "ナイフ", "はし"], a: 0 },
          { q: 'Từ vựng: "Cái kéo" tiếng Nhật là gì?', options: ["はさみ", "カッター", "ペン", "じしょ"], a: 0 },
          // NGỮ PHÁP
          { q: 'Điền trợ từ: はし______ ごはんを たべます。', options: ["で", "を", "に", "から"], a: 0 },
          { q: 'Điền trợ từ: にほんご______ レポートを かきます。', options: ["で", "を", "に", "から"], a: 0 },
          { q: 'Câu hỏi: "Thank you" は にほんごで ______ ですか。', options: ["なん", "どこ", "だれ", "いつ"], a: 0 },
          { q: 'Điền trợ từ: わたしは ともだち______ はなを あげます。', options: ["に", "で", "を", "へ"], a: 0 },
          { q: 'Điền trợ từ: わたしは はは______ プレゼントを もらいました。', options: ["に", "で", "を", "まで"], a: 0 },
          { q: 'Chọn đáp án đúng: "Tôi đã gửi email rồi."', options: ["もう メールを おくりました。", "まだ メールを おくりました。", "もう メールを おくります。", "まだ メールを おくりません。"], a: 0 },
          { q: 'Câu hỏi: もう ごはんを たべましたか。- いいえ、______。', options: ["まだです", "もうです", "たべました", "たべません"], a: 0 },
          { q: 'Dùng trợ từ gì khi nhận từ tổ chức/công ty? : ぎんこう______ おかねを かりました。', options: ["から", "で", "を", "へ"], a: 0 },
          { q: 'Cách nói lịch sự khi được mời ăn: "Con xin nhận ạ"', options: ["いただきます", "ごちそうさま", "いらっしゃい", "おあがりください"], a: 0 },
          { q: 'Ý nghĩa của "いらっしゃい":', options: ["Chào mừng quý khách/bạn đến chơi", "Mời vào", "Rất vui được gặp bạn", "Xin lỗi đã làm phiền"], a: 0 },
          // BỔ SUNG KANJI
          { q: 'Cách đọc của "{手|て}":', options: ["て", "はし", "あし", "め"], a: 0 },
          { q: 'Cách đọc của "{紙|かみ}":', options: ["かみ", "て", "はし", "ほん"], a: 0 },
          { q: 'Cách đọc của "{花|はな}":', options: ["はな", "くさ", "き", "もり"], a: 0 },
          { q: 'Cách đọc của "{荷物|にもつ}":', options: ["にもつ", "きっぷ", "おかね", "てがみ"], a: 0 },
          { q: 'Cách đọc của "{切符|きっぷ}":', options: ["きっぷ", "にもつ", "てがみ", "はがき"], a: 0 }
        ];

        // --- PIXEL ART ICONS (Giữ nguyên từ mẫu của bạn) ---
        const PixelArt = ({ pixels, colorMap, width = "60" }) => {
           const h = pixels.length; const w = pixels[0].length;
           return (
             <svg width={width} viewBox={`0 0 ${w} ${h}`} style={{imageRendering: 'pixelated'}}>
               {pixels.map((row, y) => row.split('').map((colorCode, x) => (
                   colorCode !== ' ' && <rect key={`${x}-${y}`} x={x} y={y} width="1" height="1" fill={colorMap[colorCode]} />
               )))}
             </svg>
           )
        }
        const MarioSVG = ({ isSad }) => {
          const pixels = ["   RRRRR    ", "  RRRRRRRRR ", "  KKKYYYKY  ", " KYKYYYKYYY ", " KYKYYYKKKK ", " KKKYYYYKKK ", "   YYYYYYY  ", "  RRBRRR    ", " RRRBRRRR   ", "RRRRBBRRRR  ", "YY RBYB R YY", "YYYBBBBBBYYY", "  BBBBBB    ", "  BB  BB    ", " LLL  LLL   ", "LLLL  LLLL  " ];
          const colorMap = isSad ? { 'R': '#777', 'Y': '#ccc', 'K': '#333', 'B': '#555', 'L': '#111' } : { 'R': '#E52521', 'Y': '#FFCC99', 'K': '#333333', 'B': '#00439C', 'L': '#5C3A21' }; 
          return <PixelArt pixels={pixels} colorMap={colorMap} width="80" />;
        };
        const MushroomSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'R': '#E52521', 'W': '#FFFFFF', 'F': '#FFCC99', 'K': '#000000' }} pixels={[ "   RRRR   ", "  RRRRRR  ", " RRRWWRRR ", " RRWWWWWW ", " RRRRRRRR ", "   FFFF   ", "  FFKKFF  ", "   FFFF   " ]} />;
        const PrincessSVG = ({ width="100" }) => <PixelArt width={width} colorMap={{ 'Y': '#fde047', 'P': '#f472b6', 'S': '#fecdd3', 'E': '#000000', 'R': '#e11d48' }} pixels={[ "   YYYYY   ", "  YYYYYYY  ", "  YYSSSYY  ", "  YSESESY  ", "  YSSRSSY  ", "   SSSSS   ", "   PPPPP   ", "  PPPPPPP  ", "  PPPPPPP  ", " PPPPPPPPP ", "PPPPPPPPPPP", "RRRRRRRRRRR" ]} />;
        const HeartSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'R': '#ef4444', 'W': '#ffffff' }} pixels={[ "  RR  RR  ", " RRRRRRRR ", " RRRWWRRR ", " RRRRRRRR ", "  RRRRRR  ", "   RRRR   ", "    RR    " ]} />;
        const CoinSVG = ({ width="32" }) => (
          <svg viewBox="0 0 24 24" width={width} height={width} className="inline-block animate-spin-slow">
            <circle cx="12" cy="12" r="10" fill="#FDE047" stroke="#B45309" strokeWidth="2" />
            <rect x="10" y="6" width="4" height="12" fill="#B45309" rx="1" />
          </svg>
        );

        // --- UTILS ---
        const parseText = (text) => {
          if (typeof text !== 'string') return text;
          const parts = text.split(/(\{.*?\})/g);
          return parts.map((part, index) => {
            if (part.startsWith('{') && part.endsWith('}')) {
              const [kanji, furigana] = part.slice(1, -1).split('|');
              return <ruby key={index}>{kanji}<rt className="text-black font-extrabold">{furigana}</rt></ruby>;
            }
            return <span key={index}>{part}</span>;
          });
        };

        // --- COMPONENT CHÍNH ---
        function App() {
          const [gameState, setGameState] = useState('start');
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [lives, setLives] = useState(5);
          const [studentName, setStudentName] = useState('');
          const [studentClass, setStudentClass] = useState('');
          const [feedback, setFeedback] = useState(null);
          const [questions, setQuestions] = useState([]);

          const startGame = () => {
            if (!studentName || !studentClass) return alert("Nhập tên và lớp đi em ơi!");
            const shuffled = [...quizData].sort(() => 0.5 - Math.random());
            setQuestions(shuffled);
            setCurrentQ(0); setScore(0); setLives(5); setGameState('playing');
          };

          const handleAnswer = (index) => {
            if (feedback) return;
            const isCorrect = index === questions[currentQ].a;
            setFeedback(isCorrect ? 'correct' : 'wrong');
            
            if (isCorrect) setScore(score + 10);
            else setLives(lives - 1);

            setTimeout(() => {
              if (!isCorrect && lives <= 1) setGameState('gameover');
              else if (currentQ < questions.length - 1) {
                setCurrentQ(currentQ + 1);
                setFeedback(null);
              } else setGameState('end');
            }, 1000);
          };

          return (
            <div className="w-full max-w-4xl mx-auto h-[700px] flex flex-col relative overflow-hidden bg-[#5c94fc] rounded-2xl shadow-2xl border-[6px] border-gray-800 font-sans">
              
              {gameState === 'start' && (
                <div className="flex-1 flex flex-col items-center justify-center z-10 text-white p-4">
                  <div className="mb-4 animate-bounce"><PrincessSVG /></div>
                  <h1 className="text-5xl font-black mb-4 text-[#f8d070] drop-shadow-[4px_4px_0_#000]">MINNA QUIZ BÀI 7</h1>
                  <div className="bg-[#f8d070] p-6 rounded-xl border-4 border-black mb-6 w-80 text-black">
                    <input type="text" placeholder="Tên học sinh" className="w-full p-2 mb-2 border-2 border-black" value={studentName} onChange={e => setStudentName(e.target.value)} />
                    <input type="text" placeholder="Lớp" className="w-full p-2 border-2 border-black" value={studentClass} onChange={e => setStudentClass(e.target.value)} />
                  </div>
                  <button onClick={startGame} className="px-8 py-4 bg-red-600 border-4 border-black text-2xl font-black rounded-xl game-btn">GIẢI CỨU NGAY!</button>
                </div>
              )}

              {gameState === 'playing' && (
                <>
                  <div className="flex justify-between items-center p-4 bg-black/40 text-white font-bold z-20">
                    <div>MẠNG: <span className="text-red-500">{"❤️".repeat(lives)}</span></div>
                    <div>CÂU: {currentQ + 1}/{questions.length}</div>
                    <div className="text-yellow-400 font-black text-xl">ĐIỂM: {score}</div>
                  </div>

                  <div className="flex-1 flex flex-col items-center justify-center p-4 z-20">
                    <div className="bg-[#f8d070] border-4 border-black p-8 rounded-xl mb-8 w-full text-center relative shadow-lg">
                       <h2 className="text-3xl font-black text-black leading-loose">{parseText(questions[currentQ].q)}</h2>
                    </div>

                    <div className="grid grid-cols-2 gap-4 w-full">
                      {questions[currentQ].options.map((opt, i) => (
                        <button key={i} onClick={() => handleAnswer(i)} className={`p-4 text-2xl font-bold rounded-xl border-4 game-btn bg-[#d27d2d] text-white border-black hover:bg-[#e68a32] ${feedback && i === questions[currentQ].a ? 'bg-green-500' : ''}`}>
                          {parseText(opt)}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className={`absolute bottom-24 left-10 z-30 transition-transform ${feedback === 'correct' ? 'animate-mario-jump' : ''}`}>
                    <MarioSVG isSad={feedback === 'wrong'} />
                  </div>
                  {feedback === 'correct' && <div className="absolute bottom-24 right-10 animate-obstacle-slide"><MushroomSVG /></div>}
                </>
              )}

              {(gameState === 'end' || gameState === 'gameover') && (
                <div className="flex-1 flex flex-col items-center justify-center z-50 text-white bg-black/80 p-4">
                  <h1 className="text-6xl font-black mb-4">{gameState === 'end' ? 'CHIẾN THẮNG!' : 'THẤT BẠI...'}</h1>
                  <p className="text-2xl mb-8">{studentName} - {studentClass}</p>
                  <div className="text-4xl text-yellow-400 mb-8">TỔNG ĐIỂM: {score}</div>
                  <button onClick={() => setGameState('start')} className="px-8 py-4 bg-white text-black font-black text-xl rounded-xl">CHƠI LẠI</button>
                </div>
              )}

              <div className="shrink-0 w-full h-[110px] bg-[#c84c0c] border-t-[10px] border-[#00a800] z-10"></div>
              <div className="absolute bottom-2 right-4 text-white/50 text-xs">© Minh Hoà (Bài 7)</div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
