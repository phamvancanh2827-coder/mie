<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Minna Quiz - Bài 53 - Giải Cứu Công Chúa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      /* Sửa lỗi tràn khung nhập liệu */
      * {
        box-sizing: border-box;
      }

      .safe-game-wrapper {
        background-color: #1a1a1a; padding: 20px 0; border-radius: 16px; margin: 20px 0;
        display: flex; justify-content: center; align-items: center;
      }
      ruby { ruby-align: center; }

      @keyframes mario-jump {
        0% { transform: translateY(0) scale(1); }
        30% { transform: translateY(-130px) scale(1.05); }
        60% { transform: translateY(-130px) scale(1.05); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes obstacle-slide {
        0% { transform: translateX(200px); opacity: 1; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateX(-50px); opacity: 0; }
      }
      .animate-mario-jump { animation: mario-jump 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
      .animate-obstacle-slide { animation: obstacle-slide 1.2s linear forwards; }

      /* Nút bấm nổi & Khung Dialog */
      .game-btn {
        box-shadow: 0px 6px 0px rgba(0,0,0,0.3); transition: all 0.1s;
      }
      .game-btn:active:not(:disabled) {
        box-shadow: 0px 0px 0px rgba(0,0,0,0.3); transform: translateY(6px);
      }
      .dialog-box {
        box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3), inset 4px 4px 0px rgba(255,255,255,0.3), 8px 8px 0px rgba(0,0,0,0.5);
      }
      
      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="safe-game-wrapper">
        <div id="root" class="w-full"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BỘ CÂU HỎI (60 CÂU CHUẨN BÀI 53) ---
        const quizData = [
          // PHẦN 1: 20 CÂU TỪ VỰNG 
          { q: 'Từ vựng: "{夏休|なつやす}み" tiếng Nhật nghĩa là gì?', options: ["Nghỉ hè", "Nghỉ đông", "Nghỉ xuân", "Cuối tuần"], a: 0 },
          { q: 'Từ vựng: "{工作|こうさく}" tiếng Nhật nghĩa là gì?', options: ["Đồ thủ công", "Bài tập về nhà", "Môn thể dục", "Dọn dẹp"], a: 0 },
          { q: 'Từ vựng: "{作品展|さくひんてん}" tiếng Nhật nghĩa là gì?', options: ["Triển lãm tác phẩm", "Hội thao", "Buổi hòa nhạc", "Lễ hội mùa hè"], a: 0 },
          { q: 'Từ vựng: "{牛乳|ぎゅうにゅう}パック" tiếng Nhật nghĩa là gì?', options: ["Vỏ hộp sữa giấy", "Chai nhựa", "Lon nước", "Hộp cơm"], a: 0 },
          { q: 'Từ vựng: "ペン{立|た}て" tiếng Nhật nghĩa là gì?', options: ["Ống cắm bút", "Hộp bút", "Cái bút máy", "Bảng đen"], a: 0 },
          { q: 'Từ vựng: "ペットボトル" tiếng Nhật nghĩa là gì?', options: ["Chai nhựa", "Vỏ hộp sữa", "Cốc thủy tinh", "Hộp giấy"], a: 0 },
          { q: 'Từ vựng: "いす" tiếng Nhật nghĩa là gì?', options: ["Cái ghế", "Cái bàn", "Quyển sách", "Cửa sổ"], a: 0 },
          { q: 'Từ vựng: "{絵|え}" tiếng Nhật nghĩa là gì?', options: ["Bức tranh", "Bài hát", "Tạp chí", "Từ điển"], a: 0 },
          { q: 'Từ vựng: "キャンプ" tiếng Nhật nghĩa là gì?', options: ["Cắm trại", "Đi biển", "Leo núi", "Dã ngoại"], a: 0 },
          { q: 'Từ vựng: "{海|うみ}" tiếng Nhật nghĩa là gì?', options: ["Biển", "Núi", "Sông", "Hồ"], a: 0 },
          { q: 'Từ vựng: "ロボット" tiếng Nhật nghĩa là gì?', options: ["Người máy (Robot)", "Đồ chơi", "Máy bay", "Tàu hỏa"], a: 0 },
          { q: 'Từ vựng: "{作|つく}ります" tiếng Nhật nghĩa là gì?', options: ["Làm, chế tạo", "Nộp, đưa ra", "Nghĩ, tưởng", "Bắt đầu"], a: 0 },
          { q: 'Từ vựng: "{出|だ}します" tiếng Nhật nghĩa là gì?', options: ["Nộp, đưa ra", "Làm, chế tạo", "Học thuộc", "Kết thúc"], a: 0 },
          { q: 'Từ vựng: "つもり" tiếng Nhật nghĩa là gì?', options: ["Dự định, ý định", "Sở thích", "Kế hoạch", "Quyết định"], a: 0 },
          { q: 'Cách đọc của chữ Hán "{夏休}み" là gì?', options: ["なつやすみ", "ふゆやすみ", "はるやすみ", "なつやす"], a: 0 },
          { q: 'Cách đọc của chữ Hán "{工作}" là gì?', options: ["こうさく", "こうさ", "こさく", "こしゃく"], a: 0 },
          { q: 'Cách đọc của chữ Hán "{牛乳}" là gì?', options: ["ぎゅうにゅう", "ぎゅにゅう", "きゅうにゅう", "ぎゅうにゅ"], a: 0 },
          { q: 'Cách đọc của chữ Hán "{作品展}" là gì?', options: ["さくひんてん", "さくひんでん", "さくびんてん", "ざくひんてん"], a: 0 },
          { q: 'Cách đọc của chữ Hán "{絵}" là gì?', options: ["え", "か", "は", "ね"], a: 0 },
          { q: 'Cách đọc của chữ Hán "{海}" là gì?', options: ["うみ", "かわ", "いけ", "やま"], a: 0 },

          // PHẦN 2: 40 CÂU NGỮ PHÁP (BÀI 53)
          { q: 'Chia động từ sang Thể ý định: "{作|つく}る"', options: ["{作|つく}ろう", "{作|つく}りよう", "{作|つく}ろ", "{作|つく}れ"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{行|い}く"', options: ["{行|い}こう", "{行|い}きよう", "{行|い}こ", "{行|い}け"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{休|やす}む"', options: ["{休|やす}もう", "{休|やす}みよう", "{休|やす}も", "{休|やす}め"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{帰|かえ}る"', options: ["{帰|かえ}ろう", "{帰|かえ}りよう", "{帰|かえ}ろ", "{帰|かえ}れ"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{乗|の}る"', options: ["{乗|の}ろう", "{乗|の}りよう", "{乗|の}ろ", "{乗|の}れ"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{遊|あそ}ぶ"', options: ["{遊|あそ}ぼう", "{遊|あそ}びよう", "{遊|あそ}ぼ", "{遊|あそ}べ"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{待|ま}つ"', options: ["{待|ま}とう", "{待|ま}ちよう", "{待|ま}て", "{待|ま}と"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{急|いそ}ぐ"', options: ["{急|いそ}ごう", "{急|いそ}ぎよう", "{急|いそ}げ", "{急|いそ}ご"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{手伝|てつだ}う"', options: ["{手伝|てつだ}おう", "{手伝|てつだ}いよう", "{手伝|てつだ}え", "{手伝|てつだ}お"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{読|よ}む"', options: ["{読|よ}もう", "{読|よ}みよう", "{読|よ}も", "{読|よ}め"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{話|はな}す"', options: ["{話|はな}そう", "{話|はな}しよう", "{話|はな}せ", "{話|はな}そ"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{買|か}う"', options: ["{買|か}おう", "{買|か}いよう", "{買|か}え", "{買|か}お"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{食|た}べる"', options: ["{食|た}べよう", "{食|た}べろう", "{食|た}べろ", "{食|た}べようう"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{起|お}きる"', options: ["{起|お}きよう", "{起|お}きろう", "{起|お}きろ", "{起|お}きようう"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{始|はじ}める"', options: ["{始|はじ}めよう", "{始|はじ}めろう", "{始|はじ}めろ", "{始|はじ}めるよう"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{覚|おぼ}える"', options: ["{覚|おぼ}えよう", "{覚|おぼ}えろう", "{覚|おぼ}えろ", "{覚|おぼ}え"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{開|あ}ける"', options: ["{開|あ}けよう", "{開|あ}けろう", "{開|あ}けろ", "{開|あ}け"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "{片付|かたづ}ける"', options: ["{片付|かたづ}けよう", "{片付|かたづ}けろう", "{片付|かたづ}けろ", "{片付|かたづ}け"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "する"', options: ["しよう", "すよう", "しろう", "しろ"], a: 0 },
          { q: 'Chia động từ sang Thể ý định: "くる"', options: ["こよう", "きよう", "くるよう", "こい"], a: 0 },
          { q: 'Chọn cách nói thân mật của: "おべん{当|とう}を {食|た}べましょう"', options: ["おべん{当|とう}を {食|た}べよう", "おべん{当|とう}を {食|た}べるよ", "おべん{当|とう}を {食|た}べろう", "おべん{当|とう}を {食|た}べるね"], a: 0 },
          { q: 'Chọn cách nói thân mật của: "{早|はや}く {帰|かえ}りましょう"', options: ["{早|はや}く {帰|かえ}ろう", "{早|はや}く {帰|かえ}りよう", "{早|はや}く {帰|かえ}ろうか", "{早|はや}く {帰|かえ}る"], a: 0 },
          { q: 'Chọn cách nói thân mật của: "いちれつに ならびましょう"', options: ["いちれつに ならぼう", "いちれつに ならびよう", "いちれつに ならぼ", "いちれつに ならぶ"], a: 0 },
          { q: 'Điền từ rủ rê: 「いっしょに {帰|かえ}らない？」「うん、______。」', options: ["{帰|かえ}ろう", "{帰|かえ}る", "{帰|かえ}ります", "{帰|かえ}ろうか"], a: 0 },
          { q: 'Điền từ rủ rê: 「これから {図書室|としょしつ}で しらべない？」「うん、______。」', options: ["しらべよう", "しらべる", "しらべます", "しらべろう"], a: 0 },
          { q: 'Điền từ rủ rê: 「4{時|じ}から べん{強|きょう}しない？」「うん、______。」', options: ["しよう", "する", "します", "しろう"], a: 0 },
          { q: 'Điền dạng đúng: {私|わたし}は {牛乳|ぎゅうにゅう}パックで いすを ______ と {思|おも}っています。', options: ["{作|つく}ろう", "{作|つく}る", "{作|つく}ります", "{作|つく}った"], a: 0 },
          { q: 'Điền dạng đúng: ペットボトルで {作|つく}った ロボットを ______ と {思|おも}っています。', options: ["{出|だ}そう", "{出|だ}す", "{出|だ}して", "{出|だ}した"], a: 0 },
          { q: 'Điền dạng đúng: {土曜日|どようび}に {海|うみ}に ______ と {思|おも}っています。', options: ["{行|い}こう", "{行|い}く", "{行|い}った", "{行|い}き"], a: 0 },
          { q: 'Điền dạng đúng: {妹|いもうと}の たん{生日|じょうび}に ケーキを ______ と {思|おも}っています。', options: ["{作|つく}ろう", "{作|つく}る", "{作|つく}り", "{作|つく}った"], a: 0 },
          { q: 'Điền dạng đúng: あした {図書室|としょしつ}で {本|ほん}を ______ と {思|おも}っています。', options: ["かりよう", "かりる", "かりて", "かり"], a: 0 },
          { q: 'Điền dạng đúng: よく わからないので、{先生|せんせい}に ______ と {思|おも}っています。', options: ["きこう", "きく", "きき", "きいた"], a: 0 },
          { q: 'Điền dạng đúng: つかれたので、{今|こん}ばん {早|はや}く ______ と {思|おも}っています。', options: ["ねよう", "ねる", "ねて", "ねた"], a: 0 },
          { q: 'Điền dạng đúng: {私|わたし}は キャンプの {絵|え}を ______ つもりです。', options: ["かく", "かこう", "かいて", "かいた"], a: 0 },
          { q: 'Điền dạng đúng: {海|うみ}の {絵|え}は ______ つもりです。', options: ["ださない", "だそう", "だして", "だす"], a: 0 },
          { q: 'Điền dạng đúng: {夏休|なつやす}みに {何|なに}を ______ つもりですか。', options: ["する", "しよう", "した", "し"], a: 0 },
          { q: 'Điền từ: {今日|きょう}の {体育|たいいく}は {休|やす}みますか。…はい、______ つもりです。', options: ["{休|やす}む", "{休|やす}もう", "{休|やす}んで", "{休|やす}まない"], a: 0 },
          { q: 'Điền từ: {今|こん}ばん シャワーを あびますか。…いいえ、______ つもりです。', options: ["あびない", "あびる", "あびよう", "あびなかった"], a: 0 },
          { q: 'Điền từ: {今日|きょう}は {何時|なんじ}に うちへ {帰|かえ}りますか。…5{時|じ}に ______ つもりです。', options: ["{帰|かえ}る", "{帰|かえ}ろう", "{帰|かえ}らない", "{帰|かえ}って"], a: 0 },
          { q: 'Chọn câu có nghĩa "Tôi dự định vẽ bức tranh cắm trại":', options: ["キャンプの {絵|え}を かくつもりです。", "キャンプの {絵|え}を かこうつもりです。", "キャンプの {絵|え}を かかないつもりです。", "キャンプの {絵|え}を かこうと {思|おも}っています。"], a: 0 }
        ];

        // --- CẤU TRÚC CỐT TRUYỆN DÀNH CHO 60 CÂU (6 CHẶNG) ---
        const getStoryContent = (level) => {
            switch(level) {
                case 1: return { title: "CHẶNG 1", desc: "Học cách chia Thể ý định (いこうけい) cùng Mieko!", icon: <MushroomSVG width="120" />, bg: "bg-green-600" };
                case 2: return { title: "CHẶNG 2", desc: "Dùng thể ý định để rủ rê bạn bè thật tự nhiên!", icon: <CactusSVG width="100" />, bg: "bg-yellow-600" };
                case 3: return { title: "CHẶNG 3", desc: "Khám phá cấu trúc ~ようと思っています (Dự định đang ấp ủ)!", icon: <ShellSVG width="120" />, bg: "bg-blue-600" };
                case 4: return { title: "CHẶNG 4", desc: "Khẳng định ý chí vững chắc với ~つもりです!", icon: <RockSVG width="120" />, bg: "bg-gray-600" };
                case 5: return { title: "CHẶNG 5", desc: "Vượt qua thử thách ôn tập từ vựng đồ thủ công!", icon: <IceSVG width="120" />, bg: "bg-cyan-600" };
                case 6: return { title: "CHẶNG CUỐI", desc: "Đánh bại Ma Quỷ, giải cứu Công Chúa và tham gia Triển lãm tác phẩm!", icon: <GhostSVG width="120" />, bg: "bg-indigo-900" };
                default: return { title: "", desc: "", icon: "", bg: "bg-[#5c94fc]" };
            }
        }

        // --- PIXEL ART ICONS ---
        const PixelArt = ({ pixels, colorMap, width = "60" }) => {
           const h = pixels.length;
           const w = pixels[0].length;
           return (
             <svg width={width} viewBox={`0 0 ${w} ${h}`} className="drop-shadow-[4px_4px_0_rgba(0,0,0,0.5)]" style={{imageRendering: 'pixelated'}}>
               {pixels.map((row, y) =>
                 row.split('').map((colorCode, x) => (
                   colorCode !== ' ' && <rect key={`${x}-${y}`} x={x} y={y} width="1" height="1" fill={colorMap[colorCode]} />
                 ))
               )}
             </svg>
           )
        }

        const MarioSVG = ({ isSad }) => {
          const pixels = [
            "   RRRRR    ", "  RRRRRRRRR ", "  KKKYYYKY  ", " KYKYYYKYYY ", " KYKYYYKKKK ", " KKKYYYYKKK ", "   YYYYYYY  ",
            "  RRBRRR    ", " RRRBRRRR   ", "RRRRBBRRRR  ", "YY RBYB R YY", "YYYBBBBBBYYY", "  BBBBBB    ", "  BB  BB    ",
            " LLL  LLL   ", "LLLL  LLLL  "
          ];
          const colorMap = isSad ? { 'R': '#777', 'Y': '#ccc', 'K': '#333', 'B': '#555', 'L': '#111' } : { 'R': '#E52521', 'Y': '#FFCC99', 'K': '#333333', 'B': '#00439C', 'L': '#5C3A21' }; 
          return <PixelArt pixels={pixels} colorMap={colorMap} width="80" />;
        };

        const HeartSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'R': '#ef4444', 'W': '#ffffff' }} pixels={[ "  RR  RR  ", " RRRRRRRR ", " RRRWWRRR ", " RRRRRRRR ", "  RRRRRR  ", "   RRRR   ", "    RR    " ]} />;
        const PrincessSVG = ({ width="100" }) => <PixelArt width={width} colorMap={{ 'Y': '#fde047', 'P': '#f472b6', 'S': '#fecdd3', 'E': '#000000', 'R': '#e11d48' }} pixels={[ "   YYYYY   ", "  YYYYYYY  ", "  YYSSSYY  ", "  YSESESY  ", "  YSSRSSY  ", "   SSSSS   ", "   PPPPP   ", "  PPPPPPP  ", "  PPPPPPP  ", " PPPPPPPPP ", "PPPPPPPPPPP", "RRRRRRRRRRR" ]} />;
        const LightbulbSVG = ({ width="20" }) => <PixelArt width={width} colorMap={{ 'Y': '#facc15', 'W': '#ffffff' }} pixels={[ "  YYY  ", " YYYYY ", " YYYYY ", "  YYY  ", "  WWW  ", "  WWW  " ]} />;
        const CrossSVG = ({ width="50" }) => <PixelArt width={width} colorMap={{ 'R': '#ef4444' }} pixels={[ " R      R ", "  R    R  ", "   R  R   ", "    RR    ", "   R  R   ", "  R    R  ", " R      R " ]} />;
        const CheckSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'G': '#22c55e' }} pixels={[ "       G  ", "      GG  ", " G   GGG  ", " GG GGG   ", "  GGG     ", "   G      " ]} />;
        const MiniCrossSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'R': '#ef4444' }} pixels={[ "R    R", " RR RR", "  RR  ", " RR RR", "R    R" ]} />;
        const ReplaySVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'W': '#ffffff' }} pixels={[ "  WWWW  ", " W    W ", " W  W   ", " W WWWW ", " W    W ", "  WWWW  " ]} />;
        const SendSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'W': '#ffffff' }} pixels={[ "   W    ", "  WWW   ", " WWWWW  ", "   W    ", "   W    ", " WWWWW  " ]} />;
        const EyeSVG = ({ width="24" }) => <PixelArt width={width} colorMap={{ 'W': '#ffffff', 'K': '#000000', 'B': '#3b82f6' }} pixels={[ "  WWWWW  ", " WWKKKWW ", " WKKBKWW ", " WWKKKWW ", "  WWWWW  " ]} />;

        // Chướng ngại vật
        const MushroomSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'R': '#E52521', 'W': '#FFFFFF', 'F': '#FFCC99', 'K': '#000000' }} pixels={[ "   RRRR   ", "  RRRRRR  ", " RRRWWRRR ", " RRWWWWWW ", " RRRRRRRR ", "   FFFF   ", "  FFKKFF  ", "   FFFF   " ]} />;
        const CactusSVG = ({width="40"}) => <PixelArt width={width} colorMap={{ 'C': '#22c55e', 'D': '#166534' }} pixels={[ "   CC   ", " C CC   ", " C CC   ", " C CCCC ", " C CC C ", "   CC C ", "   CC   ", "   CC   " ]} />;
        const ShellSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'G': '#16a34a', 'K': '#000000', 'W': '#ffffff' }} pixels={[ "   GGGG   ", " GGGGGGGG ", " GKKGGKKG ", " GGGGGGGG ", "WWWWWWWWWW", " W W  W W " ]} />;
        const RockSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'A': '#64748b', 'B': '#475569' }} pixels={[ "   AAAA   ", "  ABBAAA  ", " AABBAAAA ", " AAAABBAA ", "AAAAAAAAAA" ]} />;
        const IceSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'I': '#7dd3fc', 'W': '#ffffff' }} pixels={[ "   IW   ", "  IWIW  ", " IIWWII ", " IIWWII ", "  IIII  ", "   II   " ]} />;
        const GhostSVG = ({width="50"}) => <PixelArt width={width} colorMap={{ 'W': '#ffffff', 'K': '#000000' }} pixels={[ "  WWWW  ", " WWWWWW ", "WKWKKWWW", "WWWWWWWW", " WWWWWW ", "W W  W W" ]} />;

        const getObstacleSVG = (level) => {
          switch(level) {
             case 1: return <MushroomSVG />; case 2: return <CactusSVG />; case 3: return <ShellSVG />; case 4: return <RockSVG />;
             case 5: return <IceSVG />; case 6: return <GhostSVG />; default: return <MushroomSVG />;
          }
        }

        const CoinSVG = ({ width="32" }) => (
          <svg viewBox="0 0 24 24" width={width} height={width} className="inline-block animate-spin-slow drop-shadow-[2px_2px_0_rgba(0,0,0,0.5)]">
            <circle cx="12" cy="12" r="10" fill="#FDE047" stroke="#B45309" strokeWidth="2" />
            <rect x="10" y="6" width="4" height="12" fill="#B45309" rx="1" />
          </svg>
        );

        // --- ÂM THANH ---
        const playSound = (type) => {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);

          if (type === 'coin') {
            osc.type = 'square'; osc.frequency.setValueAtTime(987.77, ctx.currentTime);
            osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
          } else if (type === 'start' || type === 'levelup') {
            osc.type = 'square'; osc.frequency.setValueAtTime(261.63, ctx.currentTime); 
            osc.frequency.setValueAtTime(329.63, ctx.currentTime + 0.1); osc.frequency.setValueAtTime(392.00, ctx.currentTime + 0.2); 
            osc.frequency.setValueAtTime(523.25, ctx.currentTime + 0.3); gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
          } else if (type === 'win') {
            osc.type = 'square'; osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3); 
            osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.45); gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.8);
          } else if (type === 'gameover') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 1.2);
            gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.2);
          }
        };

        // --- BỘ PHÂN TÍCH FURIGANA ---
        const parseText = (text, isAnswer = false) => {
          if (typeof text !== 'string') return text;
          const parts = text.split(/(\{.*?\})/g);
          return parts.map((part, index) => {
            if (part.startsWith('{') && part.endsWith('}')) {
              const content = part.slice(1, -1);
              const [kanji, furigana] = content.split('|');
              const colorClass = isAnswer ? "text-white" : "text-black";
              const shadowStyle = isAnswer ? { textShadow: '1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000' } : {};
              return (
                <ruby key={index} className="mx-[2px] align-baseline">
                  {kanji}
                  <rt className={`text-[0.75em] ${colorClass} font-extrabold tracking-tighter`} style={shadowStyle}>{furigana}</rt>
                </ruby>
              );
            }
            return <span key={index}>{part}</span>;
          });
        };

        // Hàm hỗ trợ loại bỏ Furigana để hiển thị thành Plain Text gửi qua Email
        const stripFurigana = (text) => {
            if (typeof text !== 'string') return text;
            return text.replace(/\{([^|]+)\|([^}]+)\}/g, '$1($2)');
        };

        // =================================================================
        // ⚙️ CÀI ĐẶT GỬI ĐIỂM & THỜI GIAN NỘP BÀI (DEADLINE)
        // =================================================================
        const FORMSPREE_ID = "mjgjgqde"; // Mã Formspree của cô Hoà
        const FORMSPREE_URL = `https://formspree.io/f/${FORMSPREE_ID}`;
        
        // Hạn chót nộp bài. Định dạng: NĂM-THÁNG-NGÀY T GIỜ:PHÚT:GIÂY
        const DEADLINE = "2026-04-30T23:59:59"; 
        // =================================================================

        // --- COMPONENT CHÍNH ---
        function MarioQuiz() {
          const [gameState, setGameState] = useState('start'); 
          const [questions, setQuestions] = useState([]);
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          
          const [lives, setLives] = useState(5);
          const [helps, setHelps] = useState(5);
          const [disabledOptions, setDisabledOptions] = useState([]); 

          const [selectedAns, setSelectedAns] = useState(null);
          const [isAnimating, setIsAnimating] = useState(false);
          const [feedback, setFeedback] = useState(null); 
          const [storyLevel, setStoryLevel] = useState(0);
          
          const [wrongAnswersList, setWrongAnswersList] = useState([]); 
          const [studentName, setStudentName] = useState('');
          const [studentClass, setStudentClass] = useState(''); 
          const [isSubmitted, setIsSubmitted] = useState(false);
          const [isSending, setIsSending] = useState(false);
          const [isOverDeadline, setIsOverDeadline] = useState(false);

          // Kiểm tra Deadline
          useEffect(() => {
            if (DEADLINE) {
              const now = new Date();
              const deadlineDate = new Date(DEADLINE);
              if (now > deadlineDate) {
                setIsOverDeadline(true);
              }
            }
          }, []);

          const startGame = () => {
            if (!studentName.trim() || !studentClass.trim()) {
              alert("Em hãy nhập đầy đủ Tên và Lớp cho cô nhé!");
              return;
            }

            playSound('start');
            const shuffledQs = quizData.map(q => {
              const optsWithFlag = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.a }));
              const shuffledOpts = optsWithFlag.sort(() => 0.5 - Math.random());
              const newCorrectIdx = shuffledOpts.findIndex(o => o.isCorrect);
              return { q: q.q, options: shuffledOpts.map(o => o.text), a: newCorrectIdx };
            }).sort(() => 0.5 - Math.random()); 

            setQuestions(shuffledQs); setCurrentQ(0); setScore(0);
            setLives(5); setHelps(5); setDisabledOptions([]); setStoryLevel(0);
            setWrongAnswersList([]); setIsSubmitted(false); setIsSending(false);
            setGameState('playing'); setFeedback(null); setSelectedAns(null);
          };

          const handleHelp = () => {
            if (helps <= 0 || isAnimating || disabledOptions.length > 0) return;
            playSound('coin'); setHelps(prev => prev - 1);
            const correctAns = questions[currentQ].a;
            const wrongAns = [0, 1, 2, 3].filter(i => i !== correctAns);
            const shuffledWrongs = wrongAns.sort(() => 0.5 - Math.random());
            setDisabledOptions([shuffledWrongs[0], shuffledWrongs[1]]); 
          };

          const handleAnswer = (index) => {
            if (isAnimating || disabledOptions.includes(index)) return;
            setSelectedAns(index); setIsAnimating(true);
            const isCorrect = index === questions[currentQ].a;
            setFeedback(isCorrect ? 'correct' : 'wrong');
            
            if (isCorrect) {
              playSound('coin'); setScore(score + 10);
            } else {
              playSound('wrong'); setLives(prev => prev - 1);
              setWrongAnswersList(prev => [...prev, {
                q: questions[currentQ].q, userAns: questions[currentQ].options[index], correctAns: questions[currentQ].options[questions[currentQ].a]
              }]);
            }

            setTimeout(() => {
              setFeedback(null); setIsAnimating(false); setSelectedAns(null); setDisabledOptions([]); 
              
              if (!isCorrect && lives <= 1) {
                playSound('gameover'); setGameState('gameover'); return;
              }

              if (currentQ < questions.length - 1) {
                const nextQ = currentQ + 1;
                // Chuyển màn cốt truyện sau mỗi 10 câu (Bài này có 60 câu => 6 chặng)
                if (nextQ % 10 === 0 && nextQ < 60) {
                    setStoryLevel(nextQ / 10); playSound('levelup'); setGameState('story');
                } else {
                    setCurrentQ(nextQ);
                }
              } else {
                playSound('win'); setGameState('end');
              }
            }, 1800); 
          };

          const submitScore = async (e, status, detailLabel, detailValue) => {
            if(e) e.preventDefault(); 
            if (!FORMSPREE_ID) { alert("Thiếu ID Formspree!"); return; }
            setIsSending(true);
            
            const formData = new FormData();
            formData.append("Tên học sinh", studentName); 
            formData.append("Lớp", studentClass);
            formData.append("Tình trạng", status);
            formData.append(detailLabel, detailValue); 
            formData.append("Điểm số", score);

            // Gắn danh sách câu sai vào Form gửi email
            if (wrongAnswersList.length > 0) {
                const formattedWrongs = wrongAnswersList.map((item, idx) => {
                    return `Câu ${idx + 1}: ${stripFurigana(item.q)}\n- Em chọn sai: ${stripFurigana(item.userAns)}\n- Đáp án đúng: ${stripFurigana(item.correctAns)}`;
                }).join('\n\n');
                formData.append("Danh sách câu làm sai", formattedWrongs);
            } else {
                formData.append("Danh sách câu làm sai", "Tuyệt vời! Em không sai câu nào.");
            }

            try {
              const response = await fetch(FORMSPREE_URL, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
              if (response.ok) { setIsSubmitted(true); } else { alert("Lỗi gửi điểm!"); setIsSending(false); }
            } catch (error) { alert("Lỗi mạng!"); setIsSending(false); }
          };

          const currentStageNumber = Math.floor(currentQ / 10) + 1;

          return (
            <div className="w-full max-w-4xl mx-auto h-[650px] sm:h-[700px] flex flex-col relative overflow-hidden bg-[#5c94fc] rounded-xl sm:rounded-2xl shadow-2xl font-sans select-none border-[6px] border-gray-800">
              
              {/* NỀN ĐÁM MÂY */}
              <div className="absolute inset-0 pointer-events-none z-0">
                  <div className="absolute top-10 left-10 w-24 h-8 bg-white/80 rounded-full blur-[1px]"></div>
                  <div className="absolute top-24 right-20 w-32 h-10 bg-white/80 rounded-full blur-[1px]"></div>
                  <div className="absolute top-16 left-1/2 w-20 h-6 bg-white/80 rounded-full blur-[1px]"></div>
              </div>

              {/* MÀN HÌNH BẮT ĐẦU */}
              {gameState === 'start' && (
                <div className="flex-1 flex flex-col items-center justify-center z-10 text-white drop-shadow-[2px_2px_0_#000] p-4 text-center">
                  <div className="mb-4 animate-bounce"><PrincessSVG width="100"/></div>
                  <h1 className="text-4xl sm:text-5xl md:text-6xl font-black mb-4 text-center text-[#f8d070] tracking-wider stroke-black stroke-2">
                    MIEKO QUIZ - BÀI 53
                  </h1>
                  <h2 className="text-xl sm:text-2xl font-bold mb-4 text-white">Ôn tập Thể ý định & Dự định</h2>
                  
                  {!isOverDeadline ? (
                    <>
                      {/* Khung nhập tên & Lớp */}
                      <div className="bg-[#f8d070] p-4 sm:p-6 rounded-xl border-[6px] border-[#c84c0c] mb-6 w-[90%] max-w-md dialog-box flex flex-col gap-4 box-border">
                        <div className="w-full box-border">
                          <p className="text-black font-bold mb-2 text-lg drop-shadow-none text-left">Tên của em:</p>
                          <input 
                            type="text" 
                            placeholder="Ví dụ: Nguyễn Văn A" 
                            value={studentName}
                            onChange={(e) => setStudentName(e.target.value)}
                            className="w-full box-border px-4 py-3 rounded-lg border-4 border-black font-bold text-lg text-black drop-shadow-none focus:outline-none focus:border-blue-600"
                          />
                        </div>
                        <div className="w-full box-border">
                          <p className="text-black font-bold mb-2 text-lg drop-shadow-none text-left">Lớp:</p>
                          <input 
                            type="text" 
                            placeholder="Ví dụ: 10A1" 
                            value={studentClass}
                            onChange={(e) => setStudentClass(e.target.value)}
                            className="w-full box-border px-4 py-3 rounded-lg border-4 border-black font-bold text-lg text-black drop-shadow-none focus:outline-none focus:border-blue-600"
                          />
                        </div>
                      </div>

                      <button 
                        onClick={startGame} 
                        disabled={!studentName.trim() || !studentClass.trim()}
                        className={`px-8 py-4 text-white font-black text-xl sm:text-2xl rounded-xl game-btn border-4 border-red-950 flex items-center justify-center gap-2
                          ${(studentName.trim() && studentClass.trim()) ? 'bg-[#E52521] hover:bg-red-600' : 'bg-gray-500 cursor-not-allowed opacity-80'}
                        `}
                      >
                        BẮT ĐẦU GIẢI CỨU
                      </button>
                    </>
                  ) : (
                    <div className="bg-red-600 p-6 rounded-xl border-[6px] border-red-950 mb-6 w-[90%] max-w-md dialog-box flex flex-col gap-2 box-border">
                      <h2 className="text-white font-black text-2xl mb-2 drop-shadow-[2px_2px_0_#000]">⚠️ THÔNG BÁO</h2>
                      <p className="text-[#FDE047] font-bold text-lg drop-shadow-[1px_1px_0_#000]">Đã quá thời gian nộp bài!</p>
                      <p className="text-white font-bold text-base">Em không thể tham gia làm bài kiểm tra này nữa.</p>
                    </div>
                  )}
                </div>
              )}

              {/* MÀN HÌNH CỐT TRUYỆN */}
              {gameState === 'story' && (() => {
                  const story = getStoryContent(storyLevel);
                  return (
                    <div className={`absolute inset-0 z-50 flex flex-col items-center justify-center text-white drop-shadow-[2px_2px_0_#000] p-4 ${story.bg}`}>
                        <div className="absolute inset-0 border-[10px] border-white/20 animate-pulse-fast pointer-events-none"></div>
                        <div className="mb-8 animate-bounce drop-shadow-[0_15px_15px_rgba(0,0,0,0.6)]">
                            {story.icon}
                        </div>
                        <h1 className="text-5xl sm:text-6xl font-black mb-6 text-center text-[#FDE047] stroke-black stroke-2 tracking-widest">
                            {story.title}
                        </h1>
                        <p className="text-xl sm:text-2xl font-bold mb-12 text-center max-w-lg leading-relaxed border-t-4 border-b-4 border-white/30 py-4">
                            {story.desc}
                        </p>
                        <button onClick={() => { setCurrentQ(storyLevel * 10); setGameState('playing'); }} className="px-8 py-4 bg-white text-black font-black text-lg sm:text-2xl rounded-xl game-btn border-4 border-gray-400 drop-shadow-none">
                            TIẾP TỤC HÀNH TRÌNH
                        </button>
                    </div>
                  );
              })()}

              {/* MÀN HÌNH CHƠI GAME */}
              {gameState === 'playing' && (
                <>
                  <div className="shrink-0 flex justify-between items-center p-2 sm:p-4 font-bold text-white text-[11px] sm:text-base drop-shadow-[2px_2px_0_#000] bg-black/40 z-20 border-b-4 border-black/50 relative">
                    
                    {/* Lời nhắn Cố lên được cá nhân hóa theo Tên & Lớp */}
                    <div className="absolute top-full left-1/2 -translate-x-1/2 mt-2 font-black text-lg sm:text-xl text-[#FDE047] animate-pulse drop-shadow-[2px_2px_0_#000] whitespace-nowrap pointer-events-none">
                      [{studentClass}] {studentName} がんばれ！
                    </div>

                    <div className="flex flex-col items-center gap-1">
                      <span>MẠNG</span>
                      <span className="flex items-center gap-[2px]"><HeartSVG width="16" /> x{lives}</span>
                    </div>
                    <div className="flex flex-col items-center gap-1">
                      <span>TRỢ GIÚP</span>
                      <button onClick={handleHelp} disabled={helps <= 0 || disabledOptions.length > 0 || isAnimating} className={`px-3 py-1 rounded transition-all border-2 border-white drop-shadow-none shadow-sm flex items-center gap-1 ${helps > 0 && disabledOptions.length === 0 ? 'bg-blue-600 hover:bg-blue-500 active:scale-95' : 'bg-gray-600 opacity-50 cursor-not-allowed'}`}>
                        <LightbulbSVG width="14" /> x{helps}
                      </button>
                    </div>
                    <div className="flex flex-col items-center gap-1">
                      <span>CÂU HỎI</span>
                      <span>{currentQ + 1}/{questions.length}</span>
                    </div>
                    <div className="flex flex-col items-center gap-1">
                      <span>ĐIỂM</span>
                      <span className="text-[#FDE047]">{score.toString().padStart(6, '0')}</span>
                    </div>
                  </div>

                  <div className="shrink-0 w-full bg-black/50 h-1 sm:h-2 overflow-hidden z-20">
                    <div className="bg-[#00a800] h-full transition-all duration-300" style={{ width: `${((currentQ) / questions.length) * 100}%` }}></div>
                  </div>

                  <div className="flex-1 flex flex-col justify-center w-[95%] sm:w-[90%] mx-auto z-20 py-2 mt-4">
                    <div className="relative bg-[#f8d070] border-4 border-[#c84c0c] p-4 sm:p-6 rounded-xl shadow-[inset_0_-6px_0_rgba(0,0,0,0.2)] text-center shrink-0">
                      <div className="absolute -top-5 left-1/2 -translate-x-1/2 bg-[#E52521] text-white px-5 py-2 rounded-full font-bold border-2 border-black drop-shadow-md text-sm sm:text-base">?</div>
                      <h2 className="text-xl sm:text-2xl md:text-3xl font-black text-black mt-2 sm:mt-3 leading-loose tracking-wide">{parseText(questions[currentQ].q, false)}</h2>
                    </div>

                    <div className="grid grid-cols-2 gap-3 sm:gap-5 mt-5 sm:mt-8 shrink-0">
                      {questions[currentQ].options.map((opt, i) => (
                        <button key={i} onClick={() => handleAnswer(i)} disabled={isAnimating || disabledOptions.includes(i)} className={`p-3 sm:p-5 font-bold text-lg sm:text-2xl md:text-3xl rounded-xl border-4 transition-all duration-150 flex items-center justify-center min-h-[70px] sm:min-h-[90px] tracking-wide game-btn ${disabledOptions.includes(i) ? 'opacity-20 grayscale cursor-not-allowed bg-gray-500 border-gray-800 text-transparent drop-shadow-none' : ''} ${!isAnimating && !disabledOptions.includes(i) ? 'bg-[#d27d2d] border-[#8b4513] text-white hover:bg-[#e68a32]' : ''} ${isAnimating && selectedAns === i && feedback === 'correct' ? 'bg-[#00a800] border-[#004d00] text-white scale-105' : ''} ${isAnimating && selectedAns === i && feedback === 'wrong' ? 'bg-red-600 border-red-900 text-white' : ''} ${isAnimating && selectedAns !== i && questions[currentQ].a === i ? 'bg-[#00a800] border-[#004d00] text-white animate-pulse' : ''} ${isAnimating && selectedAns !== i && questions[currentQ].a !== i && !disabledOptions.includes(i) ? 'bg-gray-500 border-gray-700 text-gray-300 opacity-60' : ''}`}>
                          <span className={`inline-block w-full text-center leading-loose ${disabledOptions.includes(i) ? 'invisible' : ''}`}>{parseText(opt, true)}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className={`absolute bottom-[110px] left-4 sm:left-10 z-30 pointer-events-none hidden sm:block ${feedback === 'correct' ? 'animate-mario-jump' : ''} ${feedback === 'wrong' ? 'scale-90 opacity-80 grayscale' : ''}`}>
                    <MarioSVG isSad={feedback === 'wrong'} />
                  </div>
                  {feedback === 'correct' && <div className="absolute bottom-[110px] left-4 sm:left-10 z-20 pointer-events-none animate-obstacle-slide hidden sm:block flex items-end">{getObstacleSVG(currentStageNumber)}</div>}
                  {feedback === 'correct' && <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-bounce flex items-center gap-2 text-[#FDE047] font-black text-5xl sm:text-6xl drop-shadow-[4px_4px_0_#000] z-50 pointer-events-none">+10 <CoinSVG width="48" /></div>}
                  {feedback === 'wrong' && <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-pulse drop-shadow-[4px_4px_0_#000] z-50 pointer-events-none"><CrossSVG width="80" /></div>}
                </>
              )}

              {/* MÀN HÌNH GAME OVER */}
              {gameState === 'gameover' && (
                <div className="flex-1 flex flex-col items-center justify-center z-50 text-white drop-shadow-[2px_2px_0_#000] bg-red-900/95 backdrop-blur-md p-4">
                  <div className="mb-4 grayscale animate-pulse"><MarioSVG isSad={true} /></div>
                  <h1 className="text-5xl sm:text-6xl font-black mb-4 text-[#FDE047] text-center leading-snug stroke-black stroke-2">
                    GAME OVER!
                  </h1>
                  
                  <div className="bg-[#f8d070] border-[6px] border-[#c84c0c] p-6 rounded-xl text-center text-black drop-shadow-none dialog-box mb-6 w-full max-w-md">
                    <h2 className="text-2xl font-bold mb-2">Đừng buồn nhé, {studentName}!</h2>
                    <p className="text-lg font-bold mb-2 text-red-900">Em dừng chân ở câu: {currentQ + 1} / {questions.length}</p>
                    <p className="text-4xl font-black mt-2 text-[#E52521]">ĐIỂM: {score}</p>
                  </div>

                  {!isSubmitted ? (
                    <button onClick={(e) => submitScore(e, "Thất bại (Game Over)", "Câu dừng lại", `${currentQ + 1} / ${questions.length}`)} disabled={isSending} className="px-6 py-4 bg-blue-600 text-white font-black text-lg sm:text-xl rounded-xl game-btn border-4 border-blue-900 w-full max-w-md mb-6 drop-shadow-none flex justify-center items-center gap-2">
                      {isSending ? "ĐANG GỬI..." : <><SendSVG width="24"/> GỬI KẾT QUẢ CHO CÔ HOÀ</>}
                    </button>
                  ) : (
                    <div className="bg-green-500 border-4 border-green-800 text-white font-bold text-lg px-6 py-3 rounded-lg mb-6 drop-shadow-none flex items-center gap-2">
                      <CheckSVG width="20"/> ĐÃ GỬI KẾT QUẢ THÀNH CÔNG!
                    </div>
                  )}
                  
                  <div className="flex flex-col sm:flex-row gap-4">
                    {wrongAnswersList.length > 0 && (
                      <button onClick={() => setGameState('review')} className="px-6 py-3 bg-yellow-400 text-black font-black text-lg rounded-xl game-btn border-4 border-yellow-600 drop-shadow-none flex items-center gap-2">
                        <EyeSVG width="20"/> XEM LẠI CÂU SAI
                      </button>
                    )}
                    <button onClick={startGame} className="px-6 py-3 bg-white text-red-700 font-black text-lg rounded-xl game-btn border-4 border-gray-400 drop-shadow-none flex items-center gap-2">
                      <ReplaySVG width="20"/> THỬ LẠI TỪ ĐẦU
                    </button>
                  </div>
                </div>
              )}

              {/* MÀN HÌNH CHIẾN THẮNG */}
              {gameState === 'end' && (
                <div className="flex-1 flex flex-col items-center justify-center z-50 text-white drop-shadow-[2px_2px_0_#000] bg-pink-600/95 backdrop-blur-md p-4">
                  <div className="flex items-end justify-center gap-6 mb-4 border-b-4 border-white/30 pb-4 px-4">
                    <MarioSVG isSad={false} />
                    <div className="animate-bounce drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]"><PrincessSVG width="100" /></div>
                  </div>
                  
                  <h1 className="text-3xl sm:text-5xl font-black mb-4 text-[#FDE047] text-center leading-snug stroke-black stroke-2">
                    CỨU CÔNG CHÚA THÀNH CÔNG!
                  </h1>
                  
                  <div className="bg-[#f8d070] border-[6px] border-[#c84c0c] p-6 rounded-xl text-center text-black drop-shadow-none dialog-box mb-6 w-full max-w-md">
                    <h2 className="text-xl font-bold mb-2">Giỏi lắm, {studentName}!</h2>
                    <p className="text-4xl sm:text-5xl font-black mb-2 text-[#E52521]">ĐIỂM: {score}</p>
                    <p className="text-lg font-bold text-[#00a800] flex justify-center items-center gap-2">Vẫn còn <HeartSVG width="16"/>x{lives} mạng!</p>
                  </div>

                  {!isSubmitted ? (
                    <button onClick={(e) => submitScore(e, "Chiến thắng (Cứu được Công chúa)", "Mạng còn lại", lives)} disabled={isSending} className="px-6 py-4 bg-blue-600 text-white font-black text-lg sm:text-xl rounded-xl game-btn border-4 border-blue-900 w-full max-w-md mb-6 drop-shadow-none flex justify-center items-center gap-2">
                      {isSending ? "ĐANG GỬI..." : <><SendSVG width="24"/> GỬI KẾT QUẢ CHO CÔ HOÀ</>}
                    </button>
                  ) : (
                    <div className="bg-green-500 border-4 border-green-800 text-white font-bold text-lg px-6 py-3 rounded-lg mb-6 drop-shadow-none flex items-center gap-2">
                      <CheckSVG width="20"/> ĐÃ GỬI KẾT QUẢ THÀNH CÔNG!
                    </div>
                  )}
                  
                  <div className="flex flex-col sm:flex-row gap-4">
                    {wrongAnswersList.length > 0 && (
                      <button onClick={() => setGameState('review')} className="px-6 py-3 bg-yellow-400 text-black font-black text-lg rounded-xl game-btn border-4 border-yellow-600 drop-shadow-none flex items-center gap-2">
                        <EyeSVG width="20"/> XEM LẠI CÂU SAI
                      </button>
                    )}
                    <button onClick={startGame} className="px-6 py-3 bg-white text-pink-600 font-black text-lg rounded-xl game-btn border-4 border-gray-300 drop-shadow-none flex items-center gap-2">
                      <ReplaySVG width="20"/> CHƠI LẠI TỪ ĐẦU
                    </button>
                  </div>
                </div>
              )}

              {/* MÀN HÌNH XEM LẠI */}
              {gameState === 'review' && (
                <div className="flex-1 flex flex-col z-50 text-white p-4 sm:p-6 bg-black/95 backdrop-blur-md overflow-hidden relative">
                  <h1 className="text-3xl sm:text-4xl font-black mb-4 text-[#FDE047] text-center stroke-black stroke-2 drop-shadow-[2px_2px_0_#000] shrink-0">
                    DANH SÁCH CÂU SAI
                  </h1>
                  
                  <div className="flex-1 overflow-y-auto bg-[#1a1a1a]/80 rounded-xl p-4 border-4 border-gray-600 custom-scrollbar relative z-10 dialog-box shadow-none">
                    {wrongAnswersList.map((item, idx) => (
                      <div key={idx} className="mb-4 bg-gray-800/90 p-4 rounded-lg border-2 border-gray-500 shadow-md">
                        <p className="font-bold text-lg sm:text-xl mb-3 text-yellow-300 leading-relaxed">
                          {idx + 1}. {parseText(item.q, true)}
                        </p>
                        <div className="flex flex-col gap-2 bg-black/60 p-3 rounded border border-gray-700">
                          <p className="text-red-400 font-bold text-base sm:text-lg flex items-start gap-2">
                            <span className="mt-1"><MiniCrossSVG width="16"/></span>
                            <span className="flex-1 leading-loose">{parseText(item.userAns, true)}</span>
                          </p>
                          <p className="text-green-400 font-bold text-base sm:text-lg flex items-start gap-2">
                            <span className="mt-1"><CheckSVG width="16"/></span>
                            <span className="flex-1 leading-loose">{parseText(item.correctAns, true)}</span>
                          </p>
                        </div>
                      </div>
                    ))}
                  </div>
                  
                  <div className="shrink-0 mt-4 flex justify-center z-10">
                    <button onClick={startGame} className="px-8 py-4 bg-[#00a800] text-white font-black text-xl rounded-xl game-btn border-4 border-green-900 drop-shadow-none flex items-center gap-2">
                      <ReplaySVG width="24"/> CHƠI LẠI TỪ ĐẦU
                    </button>
                  </div>
                </div>
              )}

              {/* MẶT ĐẤT */}
              <div className="shrink-0 w-full h-[110px] bg-[#c84c0c] border-t-[10px] border-[#00a800] relative z-10">
                <div className="w-full h-full opacity-30" style={{ 
                  backgroundImage: 'linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000)', 
                  backgroundSize: '24px 24px', backgroundPosition: '0 0, 12px 12px'
                }}></div>
              </div>
              
              {/* BẢN QUYỀN GÓC DƯỚI */}
              <div className="absolute bottom-2 right-4 z-50 text-white/80 font-bold text-xs sm:text-sm drop-shadow-[1px_1px_0_#000] tracking-wide">
                © Minh Hoà (minhhoapbc@gmail.com)
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarioQuiz />);
    </script>
</body>
</html>
